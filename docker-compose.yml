services:
  web:
    build:
      context: .
      dockerfile: docker/php-apache/Dockerfile
    container_name: ${WEB_CONTAINER:-papelito-web}
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-8080}:80"
    volumes:
      - ./public_html:/var/www/html
      - ./docker/php-apache/php-local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro
      - ./docker/php-apache/msmtprc:/etc/msmtprc:ro
    environment:
      APACHE_DOCUMENT_ROOT: /var/www/html
      DB_NAME: ${DB_NAME:-papelito_local}
      DB_USER: ${DB_USER:-papelito}
      DB_PASSWORD: ${DB_PASSWORD:-papelito_local_123}
      DB_HOST: ${DB_HOST:-db}
      DB_CHARSET: ${DB_CHARSET:-utf8}
      WP_HOME: ${WP_HOME:-http://localhost:8080}
      WP_SITEURL: ${WP_SITEURL:-http://localhost:8080}
      WP_ENVIRONMENT_TYPE: ${WP_ENVIRONMENT_TYPE:-local}
      WP_MEMORY_LIMIT: ${WP_MEMORY_LIMIT:-256M}
      WP_DEBUG: ${WP_DEBUG:-true}
      WP_DEBUG_LOG: ${WP_DEBUG_LOG:-true}
      WP_DEBUG_DISPLAY: ${WP_DEBUG_DISPLAY:-false}
      DISALLOW_FILE_EDIT: ${DISALLOW_FILE_EDIT:-false}
    restart: unless-stopped

  db:
    image: mariadb:10.5
    container_name: ${DB_CONTAINER:-papelito-db}
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    environment:
      MARIADB_DATABASE: ${DB_NAME:-papelito_local}
      MARIADB_USER: ${DB_USER:-papelito}
      MARIADB_PASSWORD: ${DB_PASSWORD:-papelito_local_123}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root_local_123}
    ports:
      - "${DB_PORT:-3307}:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-p${DB_ROOT_PASSWORD:-root_local_123}"]
      interval: 5s
      timeout: 5s
      retries: 20
    restart: unless-stopped

  phpmyadmin:
    image: phpmyadmin:5-apache
    container_name: ${PHPMYADMIN_CONTAINER:-papelito-phpmyadmin}
    depends_on:
      db:
        condition: service_healthy
    environment:
      PMA_HOST: db
      PMA_PORT: 3306
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD:-root_local_123}
      UPLOAD_LIMIT: ${PHPMYADMIN_UPLOAD_LIMIT:-512M}
    ports:
      - "${PHPMYADMIN_PORT:-8081}:80"
    restart: unless-stopped

  mailpit:
    image: axllent/mailpit:latest
    container_name: ${MAILPIT_CONTAINER:-papelito-mailpit}
    ports:
      - "${MAILPIT_WEB_PORT:-8025}:8025"
      - "${MAILPIT_SMTP_PORT:-1025}:1025"
    restart: unless-stopped

volumes:
  db_data:
