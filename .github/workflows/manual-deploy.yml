name: Deploy

on:
  push:
    branches:
      - main
    paths:
      - 'public_html/wp-content/plugins/plugin_papelito/**'
      - 'public_html/wp-content/mu-plugins/**'
      - 'public_html/.htaccess'
      - 'public_html/wp-content/uploads/.htaccess'
      - 'scripts/**'
  workflow_dispatch:
    inputs:
      target:
        description: Ambiente
        required: true
        default: production
        type: choice
        options:
          - staging
          - production
      artifact:
        description: Artefato
        required: true
        default: all
        type: choice
        options:
          - all
          - plugin
          - mu-plugins
          - htaccess
      run_backup:
        description: Backup remoto antes do deploy
        required: true
        default: true
        type: boolean
      flush_cache:
        description: Flush WP-CLI
        required: true
        default: true
        type: boolean

jobs:
  detect:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    outputs:
      plugin: ${{ steps.filter.outputs.plugin }}
      mu_plugins: ${{ steps.filter.outputs.mu_plugins }}
      htaccess: ${{ steps.filter.outputs.htaccess }}
    steps:
      - uses: actions/checkout@v4
      - uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            plugin: 'public_html/wp-content/plugins/plugin_papelito/**'
            mu_plugins: 'public_html/wp-content/mu-plugins/**'
            htaccess:
              - 'public_html/.htaccess'
              - 'public_html/wp-content/uploads/.htaccess'

  deploy:
    needs:
      - detect
    if: github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        artifact:
          - plugin
          - mu-plugins
          - htaccess

    steps:
      - name: Decidir se deve rodar
        id: should_run
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_ARTIFACT: ${{ github.event.inputs.artifact || 'all' }}
          CHANGED_PLUGIN: ${{ needs.detect.outputs.plugin }}
          CHANGED_MU_PLUGINS: ${{ needs.detect.outputs.mu_plugins }}
          CHANGED_HTACCESS: ${{ needs.detect.outputs.htaccess }}
          MATRIX_ARTIFACT: ${{ matrix.artifact }}
        run: |
          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            if [[ "$INPUT_ARTIFACT" == "all" || "$INPUT_ARTIFACT" == "$MATRIX_ARTIFACT" ]]; then
              echo "run=true" >> "$GITHUB_OUTPUT"
            else
              echo "run=false" >> "$GITHUB_OUTPUT"
            fi
            exit 0
          fi

          case "$MATRIX_ARTIFACT" in
            plugin) changed="$CHANGED_PLUGIN" ;;
            mu-plugins) changed="$CHANGED_MU_PLUGINS" ;;
            htaccess) changed="$CHANGED_HTACCESS" ;;
            *) changed="false" ;;
          esac

          echo "run=${changed:-false}" >> "$GITHUB_OUTPUT"

      - name: Skip if not needed
        if: steps.should_run.outputs.run != 'true'
        run: echo "Nada a fazer para ${{ matrix.artifact }}"

      - uses: actions/checkout@v4
        if: steps.should_run.outputs.run == 'true'

      - name: Dependências
        if: steps.should_run.outputs.run == 'true'
        run: sudo apt-get update && sudo apt-get install -y rsync zip

      - name: Variáveis do ambiente remoto
        if: steps.should_run.outputs.run == 'true'
        shell: bash
        env:
          TARGET: ${{ github.event.inputs.target || 'production' }}
          RUN_BACKUP: ${{ github.event.inputs.run_backup || 'true' }}
          FLUSH_CACHE: ${{ github.event.inputs.flush_cache || 'true' }}
          REMOTE_HOST_STAGING: ${{ secrets.REMOTE_HOST_STAGING }}
          REMOTE_PORT_STAGING: ${{ secrets.REMOTE_PORT_STAGING }}
          REMOTE_USER_STAGING: ${{ secrets.REMOTE_USER_STAGING }}
          REMOTE_THEMES_DIR_STAGING: ${{ secrets.REMOTE_THEMES_DIR_STAGING }}
          REMOTE_PLUGINS_DIR_STAGING: ${{ secrets.REMOTE_PLUGINS_DIR_STAGING }}
          REMOTE_MU_PLUGINS_DIR_STAGING: ${{ secrets.REMOTE_MU_PLUGINS_DIR_STAGING }}
          REMOTE_WP_PATH_STAGING: ${{ secrets.REMOTE_WP_PATH_STAGING }}
          REMOTE_BACKUP_DIR_STAGING: ${{ secrets.REMOTE_BACKUP_DIR_STAGING }}
          SSH_PRIVATE_KEY_STAGING: ${{ secrets.SSH_PRIVATE_KEY_STAGING }}
          REMOTE_HOST_PRODUCTION: ${{ secrets.REMOTE_HOST_PRODUCTION }}
          REMOTE_PORT_PRODUCTION: ${{ secrets.REMOTE_PORT_PRODUCTION }}
          REMOTE_USER_PRODUCTION: ${{ secrets.REMOTE_USER_PRODUCTION }}
          REMOTE_THEMES_DIR_PRODUCTION: ${{ secrets.REMOTE_THEMES_DIR_PRODUCTION }}
          REMOTE_PLUGINS_DIR_PRODUCTION: ${{ secrets.REMOTE_PLUGINS_DIR_PRODUCTION }}
          REMOTE_MU_PLUGINS_DIR_PRODUCTION: ${{ secrets.REMOTE_MU_PLUGINS_DIR_PRODUCTION }}
          REMOTE_WP_PATH_PRODUCTION: ${{ secrets.REMOTE_WP_PATH_PRODUCTION }}
          REMOTE_BACKUP_DIR_PRODUCTION: ${{ secrets.REMOTE_BACKUP_DIR_PRODUCTION }}
          SSH_PRIVATE_KEY_PRODUCTION: ${{ secrets.SSH_PRIVATE_KEY_PRODUCTION }}
        run: |
          case "$TARGET" in
            staging)
              {
                echo "REMOTE_HOST=$REMOTE_HOST_STAGING"
                echo "REMOTE_PORT=${REMOTE_PORT_STAGING:-22}"
                echo "REMOTE_USER=$REMOTE_USER_STAGING"
                echo "REMOTE_THEMES_DIR=$REMOTE_THEMES_DIR_STAGING"
                echo "REMOTE_PLUGINS_DIR=$REMOTE_PLUGINS_DIR_STAGING"
                echo "REMOTE_MU_PLUGINS_DIR=$REMOTE_MU_PLUGINS_DIR_STAGING"
                echo "REMOTE_WP_PATH=$REMOTE_WP_PATH_STAGING"
                echo "REMOTE_BACKUP_DIR=$REMOTE_BACKUP_DIR_STAGING"
                echo "RUN_REMOTE_BACKUP=$RUN_BACKUP"
                echo "REMOTE_FLUSH_CACHE=$FLUSH_CACHE"
              } >> "$GITHUB_ENV"
              {
                echo "SSH_PRIVATE_KEY<<EOF"
                echo "$SSH_PRIVATE_KEY_STAGING"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
            *)
              {
                echo "REMOTE_HOST=$REMOTE_HOST_PRODUCTION"
                echo "REMOTE_PORT=${REMOTE_PORT_PRODUCTION:-22}"
                echo "REMOTE_USER=$REMOTE_USER_PRODUCTION"
                echo "REMOTE_THEMES_DIR=$REMOTE_THEMES_DIR_PRODUCTION"
                echo "REMOTE_PLUGINS_DIR=$REMOTE_PLUGINS_DIR_PRODUCTION"
                echo "REMOTE_MU_PLUGINS_DIR=$REMOTE_MU_PLUGINS_DIR_PRODUCTION"
                echo "REMOTE_WP_PATH=$REMOTE_WP_PATH_PRODUCTION"
                echo "REMOTE_BACKUP_DIR=$REMOTE_BACKUP_DIR_PRODUCTION"
                echo "RUN_REMOTE_BACKUP=$RUN_BACKUP"
                echo "REMOTE_FLUSH_CACHE=$FLUSH_CACHE"
              } >> "$GITHUB_ENV"
              {
                echo "SSH_PRIVATE_KEY<<EOF"
                echo "$SSH_PRIVATE_KEY_PRODUCTION"
                echo "EOF"
              } >> "$GITHUB_ENV"
              ;;
          esac

      - name: SSH setup
        if: steps.should_run.outputs.run == 'true'
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -p "$REMOTE_PORT" "$REMOTE_HOST" >> ~/.ssh/known_hosts

      - name: Permissões dos scripts
        if: steps.should_run.outputs.run == 'true'
        run: chmod +x scripts/*.sh scripts/lib/*.sh || true

      - name: Deploy ${{ matrix.artifact }}
        if: steps.should_run.outputs.run == 'true'
        shell: bash
        run: |
          case "${{ matrix.artifact }}" in
            plugin) ./scripts/deploy-plugin.sh ;;
            mu-plugins) ./scripts/deploy-mu-plugins.sh ;;
            htaccess) ./scripts/deploy-htaccess.sh ;;
          esac
